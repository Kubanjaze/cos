<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COS — Cognitive Operating System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #1e293b; padding: 16px; border-right: 1px solid #334155; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar h1 { font-size: 18px; color: #38bdf8; margin-bottom: 4px; }
        .sidebar .version { font-size: 11px; color: #64748b; margin-bottom: 20px; }
        .sidebar a { display: block; padding: 8px 12px; color: #94a3b8; text-decoration: none; border-radius: 6px; margin-bottom: 2px; font-size: 13px; }
        .sidebar a:hover, .sidebar a.active { background: #334155; color: #f1f5f9; }
        .sidebar .section { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px; }
        .main { margin-left: 220px; flex: 1; padding: 24px; }
        .card { background: #1e293b; border-radius: 8px; padding: 16px; margin-bottom: 16px; border: 1px solid #334155; }
        .card h2 { font-size: 14px; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .card h3 { font-size: 16px; color: #f1f5f9; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .stat { text-align: center; padding: 16px; }
        .stat .value { font-size: 28px; font-weight: 700; color: #38bdf8; }
        .stat .label { font-size: 11px; color: #64748b; margin-top: 4px; }
        .stat.clickable { cursor: pointer; border-radius: 8px; transition: background 0.15s; }
        .stat.clickable:hover { background: #334155; }
        .stat.clickable .value { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px; }
        .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .chip { padding: 6px 14px; background: #1e3a5f; color: #38bdf8; border: 1px solid #2563eb; border-radius: 20px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
        .chip:hover { background: #2563eb; color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 8px; color: #64748b; border-bottom: 1px solid #334155; font-weight: 500; }
        td { padding: 8px; border-bottom: 1px solid #1e293b; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-ok { background: #064e3b; color: #34d399; }
        .badge-warn { background: #78350f; color: #fbbf24; }
        .badge-info { background: #1e3a5f; color: #38bdf8; }
        .badge-high { background: #7f1d1d; color: #f87171; }
        .conf-bar { height: 6px; border-radius: 3px; background: #334155; overflow: hidden; }
        .conf-bar-fill { height: 100%; border-radius: 3px; background: #38bdf8; }
        .chat-input { display: flex; gap: 8px; margin-bottom: 16px; }
        .chat-input input { flex: 1; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
        .chat-input button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .chat-input button:hover { background: #1d4ed8; }
        .answer { padding: 12px; background: #0f172a; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid #38bdf8; }
        .answer .type { font-size: 10px; color: #64748b; text-transform: uppercase; }
        .node { fill: #38bdf8; }
        .link { stroke: #475569; stroke-width: 1; }
        .loading { color: #64748b; font-style: italic; }
        .error { color: #f87171; }
        .step-ok { color: #34d399; }
        .step-fail { color: #f87171; }
        .page-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .notification { padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
        .notification.warn { background: #422006; border-left: 3px solid #f59e0b; }
        .notification.info { background: #0c4a6e; border-left: 3px solid #38bdf8; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── API Client ────────────────────────────────────────
const api = {
    get: async (path) => { const r = await fetch(`/api${path}`); return r.json(); },
    post: async (path, body) => { const r = await fetch(`/api${path}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }); return r.json(); },
};

// ── Components ────────────────────────────────────────
const Sidebar = ({ page, setPage }) => (
    <div className="sidebar">
        <h1>COS</h1>
        <div className="version">Cognitive Operating System v1.0.0</div>
        <div className="section">Overview</div>
        <a className={page==='dashboard'?'active':''} onClick={()=>setPage('dashboard')}>Dashboard</a>
        <a className={page==='chat'?'active':''} onClick={()=>setPage('chat')}>Chat</a>
        <a className={page==='ingest'?'active':''} onClick={()=>setPage('ingest')}>Ingest Data</a>
        <div className="section">Knowledge</div>
        <a className={page==='memory'?'active':''} onClick={()=>setPage('memory')}>Memory</a>
        <a className={page==='graph'?'active':''} onClick={()=>setPage('graph')}>Graph</a>
        <div className="section">Analysis</div>
        <a className={page==='sar'?'active':''} onClick={()=>setPage('sar')}>SAR Analysis</a>
        <a className={page==='reasoning'?'active':''} onClick={()=>setPage('reasoning')}>Reasoning</a>
        <a className={page==='decisions'?'active':''} onClick={()=>setPage('decisions')}>Decisions</a>
        <div className="section">Execution</div>
        <a className={page==='workflows'?'active':''} onClick={()=>setPage('workflows')}>Workflows</a>
        <a className={page==='autonomous'?'active':''} onClick={()=>setPage('autonomous')}>Autonomous</a>
        <div className="section">Drug Discovery</div>
        <a className={page==='target'?'active':''} onClick={()=>setPage('target')}>Target Profile</a>
        <a className={page==='recommend'?'active':''} onClick={()=>setPage('recommend')}>What to Make</a>
        <a className={page==='assay-import'?'active':''} onClick={()=>setPage('assay-import')}>Import Assay</a>
        <div className="section">Chemistry</div>
        <a className={page==='compounds'?'active':''} onClick={()=>setPage('compounds')}>Compounds</a>
        <a className={page==='similarity'?'active':''} onClick={()=>setPage('similarity')}>Similarity</a>
        <a className={page==='cliffs'?'active':''} onClick={()=>setPage('cliffs')}>Activity Cliffs</a>
        <div className="section">Output</div>
        <a className={page==='report'?'active':''} onClick={()=>setPage('report')}>Report</a>
    </div>
);

const ConfBar = ({ value }) => (
    <div className="conf-bar"><div className="conf-bar-fill" style={{width:`${value*100}%`}}/></div>
);

// ── Stat-to-page mapping (page:tab) ──────────────────
const STAT_PAGES = {
    investigations: 'investigations', artifacts: 'artifacts', documents: 'documents',
    entities: 'entities', concepts: 'concepts', hypotheses: 'reasoning',
    decisions: 'decisions', episodes: 'episodes',
    entity_relations: 'graph', provenance: 'provenance',
};

// ── Dashboard Page ────────────────────────────────────
const Dashboard = ({ onNavigate }) => {
    const [data, setData] = useState(null);
    useEffect(() => { api.get('/dashboard').then(setData); }, []);
    if (!data) return <div className="loading">Loading dashboard...</div>;
    const c = data.counts;
    return (
        <div>
            <div className="page-title">Dashboard</div>
            <div className="card"><h2>Knowledge Base</h2>
                <div className="grid">
                    {Object.entries(c).map(([k,v]) => {
                        const target = STAT_PAGES[k];
                        return (
                            <div key={k} className={`stat ${target ? 'clickable' : ''}`}
                                 onClick={() => target && onNavigate(target)}
                                 title={target ? `Go to ${target}` : ''}>
                                <div className="value">{v}</div><div className="label">{k}</div>
                            </div>
                        );
                    })}
                </div>
            </div>
            {data.notifications.length > 0 && <div className="card"><h2>Notifications</h2>
                {data.notifications.map((n,i) => (
                    <div key={i} className={`notification ${n.severity}`} style={{cursor:'pointer'}}
                         onClick={() => onNavigate(n.link || 'dashboard')}>
                        {n.message} <span style={{fontSize:11,opacity:0.6}}>Click to view details</span>
                    </div>
                ))}
            </div>}
            <div className="card"><h2>Quick Actions</h2>
                <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                    {[{label:'SAR Analysis',icon:'📊',page:'sar',color:'#2563eb'},
                      {label:'Ask AI',icon:'🧠',page:'chat',color:'#7c3aed'},
                      {label:'Run Investigation',icon:'🔬',page:'autonomous',color:'#059669'},
                      {label:'View Graph',icon:'🕸',page:'graph',color:'#d97706'},
                      {label:'Generate Report',icon:'📄',page:'report',color:'#dc2626'},
                      {label:'Ingest Data',icon:'📁',page:'ingest',color:'#0891b2'},
                    ].map(a => (
                        <div key={a.page} onClick={()=>onNavigate(a.page)} style={{
                            flex:'1 1 140px',padding:'14px 16px',background:a.color+'22',border:`1px solid ${a.color}55`,
                            borderRadius:8,cursor:'pointer',textAlign:'center',transition:'transform 0.1s',
                        }} onMouseOver={e=>e.currentTarget.style.transform='scale(1.03)'} onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}>
                            <div style={{fontSize:24}}>{a.icon}</div>
                            <div style={{fontSize:13,fontWeight:600,color:a.color,marginTop:4}}>{a.label}</div>
                        </div>
                    ))}
                </div>
            </div>
            <div className="card"><h2>Recent Activity</h2>
                <table><thead><tr><th>Time</th><th>Type</th><th>Description</th></tr></thead>
                <tbody>{data.recent_activity.map((a,i) => (
                    <tr key={i}><td>{a.created_at}</td><td><span className="badge badge-info">{a.type}</span></td><td>{a.description}</td></tr>
                ))}</tbody></table>
            </div>
        </div>
    );
};

// ── Chat Page (dual mode: local + AI) ─────────────────
const Chat = () => {
    const [query, setQuery] = useState('');
    const [result, setResult] = useState(null);
    const [aiResult, setAiResult] = useState(null);
    const [loading, setLoading] = useState(false);
    const [mode, setMode] = useState('local');
    const [suggestions, setSuggestions] = useState([]);
    const [spend, setSpend] = useState(null);
    useEffect(() => {
        api.get('/chat/suggestions').then(setSuggestions);
        api.get('/llm/spend').then(setSpend);
    }, []);
    const submit = async (q) => {
        const text = q || query;
        if (!text.trim()) return;
        setQuery(text); setLoading(true);
        setResult(null); setAiResult(null);
        if (mode === 'ai') {
            const r = await api.get(`/llm/ask?q=${encodeURIComponent(text)}`);
            setAiResult(r);
            api.get('/llm/spend').then(setSpend);
        } else {
            const r = await api.get(`/chat?q=${encodeURIComponent(text)}`);
            setResult(r);
        }
        setLoading(false);
    };
    return (
        <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div className="page-title" style={{marginBottom:0}}>Chat</div>
                <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>setMode('local')} style={{padding:'6px 14px',borderRadius:6,border:'1px solid #334155',
                        background:mode==='local'?'#2563eb':'transparent',color:mode==='local'?'white':'#94a3b8',cursor:'pointer',fontSize:12}}>
                        Local (free)</button>
                    <button onClick={()=>setMode('ai')} style={{padding:'6px 14px',borderRadius:6,border:'1px solid #334155',
                        background:mode==='ai'?'#7c3aed':'transparent',color:mode==='ai'?'white':'#94a3b8',cursor:'pointer',fontSize:12}}>
                        AI (Claude)</button>
                </div>
            </div>
            {mode==='ai' && spend && <div style={{fontSize:11,color:'#64748b',marginBottom:8}}>
                Budget: ${spend.remaining?.toFixed(4)} remaining of ${spend.budget?.toFixed(2)} | {spend.api_queries} API calls, {spend.cached_queries} cached | Model: {spend.model}
            </div>}
            <div className="chat-input">
                <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}
                       placeholder={mode==='ai'?'Ask Claude about your data...':'Ask COS anything...'} />
                <button onClick={()=>submit()} disabled={loading} style={{background:mode==='ai'?'#7c3aed':'#2563eb',color:'white',border:'none',borderRadius:6,padding:'10px 20px',cursor:'pointer'}}>
                    {loading?'...':mode==='ai'?'Ask AI':'Ask'}</button>
            </div>
            {!result && !aiResult && suggestions.length > 0 && <div className="card"><h2>Suggested Queries</h2>
                <div className="suggestion-chips">
                    {suggestions.map((s,i) => <div key={i} className="chip" onClick={()=>submit(s)}>{s}</div>)}
                </div>
            </div>}
            {result && <div className="card"><h2>Local Answers ({result.answer_count}, {result.duration_s}s)</h2>
                {result.answers.map((a,i) => (
                    <div key={i} className="answer">
                        <div className="type">{a.type} — {a.source} — {(a.confidence*100).toFixed(0)}% confidence</div>
                        <div style={{whiteSpace:'pre-wrap',marginTop:4}}>{a.content}</div>
                    </div>
                ))}
            </div>}
            {aiResult && <div className="card" style={{borderColor:aiResult.budget_exceeded?'#f87171':'#7c3aed'}}>
                <h2 style={{color:'#a78bfa'}}>Claude AI {aiResult.cached?'(cached — free)':''}</h2>
                {aiResult.budget_exceeded ? (
                    <div style={{color:'#f87171',padding:12}}>{aiResult.answer}</div>
                ) : (
                    <div style={{whiteSpace:'pre-wrap',lineHeight:1.6,padding:4}}>{aiResult.answer}</div>
                )}
                {!aiResult.budget_exceeded && <div style={{marginTop:10,fontSize:11,color:'#64748b',borderTop:'1px solid #334155',paddingTop:8}}>
                    {aiResult.cached?'Cached (free)': `Cost: $${aiResult.cost_usd?.toFixed(6)} | ${aiResult.input_tokens}+${aiResult.output_tokens} tokens`}
                    {' | '}Budget remaining: ${aiResult.budget_remaining?.toFixed(4)}
                </div>}
            </div>}
            {(result || aiResult) && <div style={{marginTop:12}}>
                <div className="suggestion-chips">
                    {suggestions.filter(s=>s!==query).slice(0,4).map((s,i) => <div key={i} className="chip" onClick={()=>submit(s)}>{s}</div>)}
                </div>
            </div>}
        </div>
    );
};

// ── Memory Page ───────────────────────────────────────
const Memory = () => {
    const [entities, setEntities] = useState([]);
    const [concepts, setConcepts] = useState([]);
    const [gaps, setGaps] = useState(null);
    useEffect(() => {
        api.get('/entities').then(setEntities);
        api.get('/concepts').then(setConcepts);
        api.get('/gaps').then(setGaps);
    }, []);
    return (
        <div>
            <div className="page-title">Memory</div>
            <div className="card"><h2>Concepts ({concepts.length})</h2>
                <table><thead><tr><th>Name</th><th>Domain</th><th>Category</th><th>Confidence</th></tr></thead>
                <tbody>{concepts.map(c => (
                    <tr key={c.id}><td>{c.name}</td><td>{c.domain}</td><td>{c.category}</td>
                    <td><ConfBar value={c.confidence}/> {(c.confidence*100).toFixed(0)}%</td></tr>
                ))}</tbody></table>
            </div>
            <div className="card"><h2>Entities ({entities.length})</h2>
                <table><thead><tr><th>Name</th><th>Type</th><th>Confidence</th></tr></thead>
                <tbody>{entities.slice(0,20).map(e => (
                    <tr key={e.id}><td>{e.name}</td><td><span className="badge badge-info">{e.type}</span></td>
                    <td>{(e.confidence*100).toFixed(0)}%</td></tr>
                ))}</tbody></table>
                {entities.length > 20 && <div style={{color:'#64748b',marginTop:8}}>...and {entities.length-20} more</div>}
            </div>
            {gaps && <div className="card"><h2>Knowledge Gaps ({gaps.total_gaps})</h2>
                <div className="grid">
                    <div className="stat"><div className="value">{gaps.unlinked_entities}</div><div className="label">Unlinked Entities</div></div>
                    <div className="stat"><div className="value">{gaps.low_confidence_concepts}</div><div className="label">Low Confidence</div></div>
                    <div className="stat"><div className="value">{gaps.orphan_chunks}</div><div className="label">Orphan Chunks</div></div>
                    <div className="stat"><div className="value">{gaps.sparse_domains}</div><div className="label">Sparse Domains</div></div>
                </div>
            </div>}
        </div>
    );
};

// ── Interactive Graph (force-directed, draggable, clickable) ──
const SCAFFOLD_COLORS = { benz:'#4C72B0', naph:'#DD8452', ind:'#55A868', quin:'#C44E52', pyr:'#8172B2', bzim:'#937860' };
const getNodeColor = (name) => { const p = name.split('_')[0]; return SCAFFOLD_COLORS[p] || '#38bdf8'; };

const GraphViz = ({ nodes, edges, center, onNodeClick }) => {
    const svgRef = React.useRef(null);
    const [positions, setPositions] = useState({});
    const [dragging, setDragging] = useState(null);
    const [hovered, setHovered] = useState(null);
    const [offset, setOffset] = useState({x:0,y:0});
    const width = 900, height = 550;

    // Build adjacency for edge lookup
    const edgeIndex = {};
    edges.forEach(e => {
        edgeIndex[e.source] = (edgeIndex[e.source]||0) + 1;
        edgeIndex[e.target] = (edgeIndex[e.target]||0) + 1;
    });

    // Initialize positions with force-directed layout
    useEffect(() => {
        const pos = {};
        const N = nodes.length;
        // Initial radial layout
        nodes.forEach((n, i) => {
            if (n === center) {
                pos[n] = { x: width/2, y: height/2, vx: 0, vy: 0 };
            } else {
                const angle = (i / Math.max(1, N-1)) * 2 * Math.PI;
                const r = Math.min(width, height) * 0.32;
                pos[n] = { x: width/2 + r*Math.cos(angle), y: height/2 + r*Math.sin(angle), vx: 0, vy: 0 };
            }
        });

        // Run simple force simulation (60 iterations)
        for (let iter = 0; iter < 60; iter++) {
            // Repulsion between all nodes
            for (let i = 0; i < N; i++) {
                for (let j = i+1; j < N; j++) {
                    const a = pos[nodes[i]], b = pos[nodes[j]];
                    let dx = b.x - a.x, dy = b.y - a.y;
                    const dist = Math.max(1, Math.sqrt(dx*dx + dy*dy));
                    const force = 800 / (dist * dist);
                    dx = (dx/dist)*force; dy = (dy/dist)*force;
                    a.vx -= dx; a.vy -= dy;
                    b.vx += dx; b.vy += dy;
                }
            }
            // Attraction along edges
            edges.forEach(e => {
                const a = pos[e.source], b = pos[e.target];
                if (!a || !b) return;
                let dx = b.x - a.x, dy = b.y - a.y;
                const dist = Math.max(1, Math.sqrt(dx*dx + dy*dy));
                const force = (dist - 100) * 0.02;
                dx = (dx/dist)*force; dy = (dy/dist)*force;
                a.vx += dx; a.vy += dy;
                b.vx -= dx; b.vy -= dy;
            });
            // Center gravity
            nodes.forEach(n => {
                const p = pos[n];
                p.vx += (width/2 - p.x) * 0.005;
                p.vy += (height/2 - p.y) * 0.005;
            });
            // Apply velocity with damping
            nodes.forEach(n => {
                const p = pos[n];
                p.vx *= 0.7; p.vy *= 0.7;
                p.x += p.vx; p.y += p.vy;
                p.x = Math.max(30, Math.min(width-30, p.x));
                p.y = Math.max(30, Math.min(height-30, p.y));
            });
        }
        setPositions({...pos});
    }, [nodes.join(','), edges.length, center]);

    const handleMouseDown = (name, e) => {
        e.preventDefault();
        const svg = svgRef.current.getBoundingClientRect();
        setDragging(name);
        setOffset({ x: e.clientX - svg.left - positions[name].x, y: e.clientY - svg.top - positions[name].y });
    };
    const handleMouseMove = (e) => {
        if (!dragging || !positions[dragging]) return;
        const svg = svgRef.current.getBoundingClientRect();
        const newPos = {...positions};
        newPos[dragging] = {...newPos[dragging], x: e.clientX - svg.left - offset.x, y: e.clientY - svg.top - offset.y};
        setPositions(newPos);
    };
    const handleMouseUp = () => setDragging(null);

    if (Object.keys(positions).length === 0) return <div className="loading">Computing layout...</div>;

    return (
        <div>
            <svg ref={svgRef} width={width} height={height}
                 style={{background:'#0f172a',borderRadius:8,cursor:dragging?'grabbing':'default'}}
                 onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>
                {/* Edges */}
                {edges.map((e,i) => {
                    const s = positions[e.source], t = positions[e.target];
                    if (!s || !t) return null;
                    const isHighlight = hovered && (e.source===hovered || e.target===hovered);
                    return (<g key={'e'+i}>
                        <line x1={s.x} y1={s.y} x2={t.x} y2={t.y}
                              stroke={isHighlight?'#64748b':'#1e293b'} strokeWidth={isHighlight?2.5:1.2}/>
                        {isHighlight && <text x={(s.x+t.x)/2} y={(s.y+t.y)/2-6} textAnchor="middle"
                              fill="#94a3b8" fontSize={9} style={{pointerEvents:'none'}}>{e.relation}</text>}
                    </g>);
                })}
                {/* Nodes */}
                {nodes.map(n => {
                    const p = positions[n]; if (!p) return null;
                    const isCenter = n === center;
                    const isHov = n === hovered;
                    const connections = edgeIndex[n] || 0;
                    const r = isCenter ? 16 : Math.max(7, Math.min(14, 6 + connections));
                    return (<g key={n} style={{cursor:'pointer'}}
                              onMouseDown={(e)=>handleMouseDown(n,e)}
                              onMouseEnter={()=>setHovered(n)}
                              onMouseLeave={()=>setHovered(null)}
                              onDoubleClick={()=>onNodeClick && onNodeClick(n)}>
                        <circle cx={p.x} cy={p.y} r={isHov?r+3:r} fill={getNodeColor(n)}
                                opacity={hovered && !isHov ? 0.4 : 0.9}
                                stroke={isCenter?'#f1f5f9':isHov?'#f1f5f9':'none'} strokeWidth={isCenter||isHov?2:0}/>
                        <text x={p.x} y={p.y-r-4} textAnchor="middle" fill={isHov?'#f1f5f9':'#64748b'}
                              fontSize={isCenter?12:isHov?11:9} fontWeight={isHov?700:400}
                              style={{pointerEvents:'none'}}>{n.length>18?n.substring(0,15)+'...':n}</text>
                    </g>);
                })}
            </svg>
            {hovered && <div style={{padding:8,fontSize:12,color:'#94a3b8'}}>
                <strong>{hovered}</strong> — {edgeIndex[hovered]||0} connection(s)
                {hovered !== center && <span> | Double-click to re-center</span>}
                <span> | Drag to reposition</span>
            </div>}
        </div>
    );
};

const Autonomous = () => {
    const [question, setQuestion] = useState('');
    const [result, setResult] = useState(null);
    const [loading, setLoading] = useState(false);
    const [monitor, setMonitor] = useState(null);
    const [priorities, setPriorities] = useState([]);
    useEffect(() => {
        api.get('/auto/monitor').then(setMonitor);
        api.get('/auto/priorities').then(setPriorities);
    }, []);
    const run = async () => {
        if (!question.trim()) return;
        setLoading(true);
        const r = await api.post('/auto/investigate', { question });
        setResult(r); setLoading(false);
    };
    return (
        <div>
            <div className="page-title">Autonomous Investigation</div>
            {monitor && <div className="card"><h2>System Monitor: {monitor.overall}</h2>
                <table><thead><tr><th>Check</th><th>Status</th></tr></thead>

                <div className="chat-input">
                    <input value={question} onChange={e=>setQuestion(e.target.value)} onKeyDown={e=>e.key==='Enter'&&run()} placeholder="Enter investigation question..." />

                    <div style={{marginBottom:12}}>Status: <span className={`badge ${result.status==='complete'?'badge-ok':'badge-high'}`}>{result.status}</span> — {result.duration_s}s, {(result.success_rate*100).toFixed(0)}% success</div>

        if (compareA && compareB) api.get(`/sar/compare/${compareA}/${compareB}`).then(setComparison);
    };

    const actColor = (val) => {
        if (!val) return '#1e293b';
        const t = Math.max(0, Math.min(1, (val - 5) / 4)); // 5-9 range
        const r = Math.round(239 * (1-t) + 52 * t);
        const g = Math.round(68 * (1-t) + 211 * t);
        const b = Math.round(68 * (1-t) + 153 * t);
        return `rgb(${r},${g},${b})`;
    };
    return (<div>
        <div className="page-title">SAR Analysis</div>

        {/* Scaffold Profile Cards */}
        <div className="card"><h2>Scaffold Profiles</h2>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                {profiles.map(p => (
                    <div key={p.scaffold} style={{flex:'1 1 250px',background:'#0f172a',borderRadius:8,padding:14,

                            <span style={{fontSize:12,color:'#64748b'}}>{p.compound_count} compounds</span>
                        </div>

                            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>

                            </div>
                            <div className="conf-bar" style={{marginTop:4}}><div className="conf-bar-fill" style={{width:`${(p.avg_pIC50/10)*100}%`,background:SCAFFOLD_COLORS[p.scaffold]||'#38bdf8'}}/></div>
                            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#64748b',marginTop:4}}>
                                <span>Best: {p.best_pIC50}</span><span>Worst: {p.worst_pIC50}</span><span>Spread: {p.spread}</span>
                            </div>
                        </div>}
                        {!p.avg_pIC50 && <div style={{color:'#64748b',fontSize:12,marginTop:8}}>No activity data</div>}
                    </div>
                ))}
            </div>
        </div>

        {/* Activity Heatmap */}
        {heatmap.length > 0 && <div className="card"><h2>Activity Heatmap</h2>
            <div style={{overflowX:'auto'}}>
                <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                    {heatmap.map((d,i) => (
                        <div key={i} style={{width:28,height:28,borderRadius:4,background:actColor(d.pIC50),
                            display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'white',
                            cursor:'default'}} title={`${d.compound}: pIC50=${d.pIC50}`}>
                            {d.pIC50.toFixed(1)}

// ── Molecule SVG component ───────────────────────────
const MolSVG = ({ base64svg, width, height }) => {
    if (!base64svg) return <div style={{width,height,background:'#1e293b',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#475569'}}>No structure</div>;
    const svg = atob(base64svg);
    return <div style={{width,height}} dangerouslySetInnerHTML={{__html: svg.replace(/width='[^']*'/, `width='${width}'`).replace(/height='[^']*'/, `height='${height}'`)}} />;
};

// ── Assay Import Page ───────────────────────────────
const AssayImport = () => {
    const [result, setResult] = useState(null);
    const [loading, setLoading] = useState(false);
    const handleUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setLoading(true);
        const formData = new FormData();
        formData.append('file', file);
        formData.append('investigation_id', 'default');
        try {
            const resp = await fetch('/api/assay/import', { method: 'POST', body: formData });
            const data = await resp.json();
            setResult(data);
        } catch (err) {
            setResult({ status: 'error', message: err.message });
        }
        setLoading(false);
    };
    return (<div>
        <div className="page-title">Import Assay Data</div>
        <div className="card">
            <h2>Upload CSV</h2>
            <p style={{color:'#94a3b8',marginBottom:12}}>
                Upload a CSV file with assay data. Expected columns:<br/>
                <code style={{color:'#38bdf8'}}>compound_name, activity_type, activity_value</code> (optionally: smiles, unit)
            </p>
            <div style={{padding:24,border:'2px dashed #334155',borderRadius:8,textAlign:'center',cursor:'pointer',position:'relative'}}>
                <input type="file" accept=".csv" onChange={handleUpload}
                       style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/>
                <div style={{fontSize:32}}>📁</div>
                <div style={{fontSize:14,color:'#94a3b8',marginTop:8}}>{loading ? 'Importing...' : 'Click or drag CSV file here'}</div>
            </div>
            {result && <div style={{marginTop:12,padding:12,borderRadius:6,
                background:result.status==='success'?'#064e3b':'#7f1d1d'}}>
                {result.status === 'success' ? (
                    <div>Imported <strong>{result.imported}</strong> records from {result.filename}</div>
                ) : (
                    <div>Error: {result.message}</div>
                )}
            </div>}
        </div>
        <div className="card">
            <h2>CSV Format Example</h2>
            <pre style={{background:'#0f172a',padding:12,borderRadius:6,fontSize:12,overflow:'auto'}}>
{`compound_name,activity_type,activity_value
benz_013_NH2,pIC50,7.45
benz_014_OEt,pIC50,6.80
new_compound_1,IC50,50
new_compound_2,IC50,120`}
            </pre>
        </div>
    </div>);
};

// ── Ingest Page ──────────────────────────────────────
const Ingest = () => {
    const [filePath, setFilePath] = useState('');
    const [investigation, setInvestigation] = useState('default');
    const [result, setResult] = useState(null);
    const [loading, setLoading] = useState(false);
    const [artifacts, setArtifacts] = useState([]);
    useEffect(() => { api.get('/artifacts').then(setArtifacts); }, []);
    const submit = async () => {
        if (!filePath.trim()) return;
        setLoading(true);
        const r = await api.post('/ingest/path', null);
        // Use query params approach
        const resp = await fetch(`/api/ingest/path?file_path=${encodeURIComponent(filePath)}&investigation_id=${encodeURIComponent(investigation)}`, {method:'POST'});
        const data = await resp.json();
        setResult(data); setLoading(false);
        if (data.status === 'success') api.get('/artifacts').then(setArtifacts);
    };
    return (<div>
        <div className="page-title">Ingest Data</div>
        <div className="card">
            <h2>Ingest a File</h2>
            <p style={{color:'#94a3b8',marginBottom:12}}>Provide a local file path (CSV, TXT, PDF, JSON, MD) to ingest into the COS knowledge base.</p>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <input value={filePath} onChange={e=>setFilePath(e.target.value)} placeholder="C:\path\to\your\data.csv" style={{padding:'10px 14px',background:'#0f172a',border:'1px solid #334155',borderRadius:6,color:'#e2e8f0',fontSize:14}}/>
                <div style={{display:'flex',gap:8}}>
                    <input value={investigation} onChange={e=>setInvestigation(e.target.value)} placeholder="Investigation ID" style={{flex:1,padding:'10px 14px',background:'#0f172a',border:'1px solid #334155',borderRadius:6,color:'#e2e8f0',fontSize:13}}/>
                    <button onClick={submit} disabled={loading} style={{padding:'10px 24px',background:'#2563eb',color:'white',border:'none',borderRadius:6,cursor:'pointer',fontSize:14}}>{loading?'Ingesting...':'Ingest'}</button>
                </div>
            </div>
            {result && <div style={{marginTop:12,padding:12,borderRadius:6,background:result.status==='success'?'#064e3b':'#7f1d1d'}}>
                {result.status === 'success' ? (
                    <div>Ingested: {result.uri} — {result.type}, {result.size} bytes, ID: {result.id}</div>
                ) : (
                    <div>Error: {result.message}</div>
                )}
            </div>}
        </div>
        <div className="card"><h2>Existing Artifacts ({artifacts.length})</h2>
            {artifacts.length === 0 ? <div className="loading">No artifacts yet.</div> :
            <table><thead><tr><th>ID</th><th>Type</th><th>Size</th><th>Investigation</th><th>Created</th></tr></thead>
            <tbody>{artifacts.map(a => (
                <tr key={a.id}><td>{(a.id||'').substring(0,12)}</td><td><span className="badge badge-info">{a.type}</span></td>
                <td>{a.size_bytes} bytes</td><td>{a.investigation_id}</td><td>{a.created_at}</td></tr>
            ))}</tbody></table>}
        </div>
    </div>);
};

// ── Notification Detail Pages ─────────────────────────
const Conflicts = () => {
    const [data, setData] = useState([]);
    useEffect(() => { api.get('/conflicts').then(setData); }, []);
    return (<div>
        <div className="page-title">Conflicts ({data.length})</div>
        {data.length === 0 ? <div className="card"><div className="loading">No conflicts found.</div></div> :
        data.map(c => (
            <div key={c.id} className="card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <h3>{c.type.replace(/_/g,' ')}</h3>
                    <div>
                        <span className={`badge ${c.severity==='high'?'badge-high':c.severity==='medium'?'badge-warn':'badge-info'}`}>{c.severity}</span>
                        {' '}
                        <span className={`badge ${c.status==='open'?'badge-warn':'badge-ok'}`}>{c.status}</span>
                    </div>
                </div>
                <div style={{marginBottom:8}}>{c.description}</div>
                <div style={{fontSize:12,color:'#64748b'}}>
                    Item A: {c.item_a} | Item B: {c.item_b} | Created: {c.created_at}
                </div>
                {c.resolution && <div style={{marginTop:8,padding:8,background:'#064e3b',borderRadius:4,fontSize:13}}>Resolution: {c.resolution}</div>}
            </div>
        ))}
    </div>);
};

const LowConfidence = () => {
    const [data, setData] = useState([]);
    useEffect(() => { api.get('/low-confidence').then(setData); }, []);
    return (<div>
        <div className="page-title">Low-Confidence Concepts ({data.length})</div>
        <div className="card">
            <p style={{color:'#94a3b8',marginBottom:12}}>These concepts have confidence below 50% and may need verification or additional evidence.</p>
            {data.length === 0 ? <div className="loading">No low-confidence concepts.</div> :
            <table><thead><tr><th>Name</th><th>Domain</th><th>Confidence</th><th>Definition</th></tr></thead>
            <tbody>{data.map(c => (
                <tr key={c.id}><td><strong>{c.name}</strong></td><td>{c.domain}</td>
                <td><ConfBar value={c.confidence}/> <span style={{color:c.confidence<0.3?'#f87171':'#fbbf24'}}>{(c.confidence*100).toFixed(0)}%</span></td>
                <td style={{fontSize:12,color:'#94a3b8'}}>{c.definition.substring(0,100)}...</td></tr>
            ))}</tbody></table>}
        </div>
    </div>);
};

// ── App ───────────────────────────────────────────────
const App = () => {
    const [page, setPage] = useState('dashboard');
    const navigate = (p) => setPage(p);
    const pageMap = {
        dashboard: () => <Dashboard onNavigate={navigate} />,
        chat: () => <Chat />, memory: () => <Memory />, graph: () => <Graph />,
        reasoning: () => <Reasoning />, decisions: () => <Decisions />,
        workflows: () => <Workflows />, autonomous: () => <Autonomous />,
        entities: () => <Entities />, concepts: () => <Concepts />,
        investigations: () => <Investigations />, artifacts: () => <Artifacts />,
        documents: () => <Documents />, episodes: () => <Episodes />,
        provenance: () => <Provenance />,
        sar: () => <SAR />, report: () => <Report />,
        target: () => <TargetProfile />, recommend: () => <Recommend />, "assay-import": () => <AssayImport />,
        compounds: () => <Compounds />, similarity: () => <Similarity />, cliffs: () => <ActivityCliffs />,
        ingest: () => <Ingest />,
        conflicts: () => <Conflicts />, "low-confidence": () => <LowConfidence />,
    };
    const renderPage = pageMap[page] || pageMap.dashboard;
    return (
        <div className="app">
            <Sidebar page={page} setPage={setPage} />
            <div className="main">{renderPage()}</div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
